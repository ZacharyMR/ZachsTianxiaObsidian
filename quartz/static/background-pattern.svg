<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="tianxia-pattern" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- More visible grid pattern -->
      <path d="M 0 0 L 200 0 M 0 20 L 200 20 M 0 40 L 200 40 M 0 60 L 200 60 M 0 80 L 200 80 M 0 100 L 200 100 M 0 120 L 200 120 M 0 140 L 200 140 M 0 160 L 200 160 M 0 180 L 200 180" 
            fill="none" stroke="#d3c6ab" stroke-width="0.8" opacity="0.4"/>
      <path d="M 0 0 L 0 200 M 20 0 L 20 200 M 40 0 L 40 200 M 60 0 L 60 200 M 80 0 L 80 200 M 100 0 L 100 200 M 120 0 L 120 200 M 140 0 L 140 200 M 160 0 L 160 200 M 180 0 L 180 200" 
            fill="none" stroke="#d3c6ab" stroke-width="0.8" opacity="0.4"/>
      
      <!-- Tianxia-inspired elements - more visible -->
      <circle cx="50" cy="50" r="2" fill="#d3c6ab" opacity="0.3"/>
      <circle cx="150" cy="50" r="2" fill="#d3c6ab" opacity="0.3"/>
      <circle cx="50" cy="150" r="2" fill="#d3c6ab" opacity="0.3"/>
      <circle cx="150" cy="150" r="2" fill="#d3c6ab" opacity="0.3"/>
      <circle cx="100" cy="100" r="1.5" fill="#d3c6ab" opacity="0.4"/>
      
      <!-- Add some subtle diagonal lines for texture -->
      <path d="M 0 0 L 200 200" fill="none" stroke="#d3c6ab" stroke-width="0.3" opacity="0.2"/>
      <path d="M 200 0 L 0 200" fill="none" stroke="#d3c6ab" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#tianxia-pattern)" />
</svg>
