<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="tianxia-pattern" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Very subtle grid pattern -->
      <path d="M 0 0 L 200 0 M 0 40 L 200 40 M 0 80 L 200 80 M 0 120 L 200 120 M 0 160 L 200 160" 
            fill="none" stroke="#d3c6ab" stroke-width="0.3" opacity="0.15"/>
      <path d="M 0 0 L 0 200 M 40 0 L 40 200 M 80 0 L 80 200 M 120 0 L 120 200 M 160 0 L 160 200" 
            fill="none" stroke="#d3c6ab" stroke-width="0.3" opacity="0.15"/>
      
      <!-- Very subtle decorative elements -->
      <circle cx="100" cy="100" r="0.8" fill="#d3c6ab" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#tianxia-pattern)" />
</svg>
